name: Grouted
options:
  bundleIdPrefix: com.shimondeitel.grouted
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Grouted:
    type: application
    platform: iOS
    sources:
      - path: Grouted
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grouted
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Grouted/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GroutedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GroutedTests
      - path: Grouted.storekit
    dependencies:
      - target: Grouted
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grouted.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GroutedUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GroutedUITests
    dependencies:
      - target: Grouted
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grouted.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Grouted:
    build:
      targets:
        Grouted: all
        GroutedTests: [test]
        GroutedUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Grouted.storekit
    test:
      config: Debug
      storeKitConfiguration: Grouted.storekit
      targets:
        - GroutedTests
        - GroutedUITests
    archive:
      config: Release
